# appveyor.yml — Fallback CI for when GitHub Actions is unavailable.
# Single-job build: wiki (Node/TiddlyWiki) + Tauri, all on a Windows VS2022 runner.
#
# SETUP:
#   1. Connect this repo at https://ci.appveyor.com (sign in with GitHub)
#   2. Project Settings → Environment → add encrypted variable:
#      GITHUB_TOKEN = <PAT with repo scope>
#   3. Push a commit or trigger manually from the AppVeyor dashboard.

version: '{build}'

image: Visual Studio 2022

branches:
  only:
    - main

environment:
  TIDDLYWIKI_PLUGIN_PATH: $(APPVEYOR_BUILD_FOLDER)/wiki;$(APPVEYOR_BUILD_FOLDER)/wiki/plugins
  TIDDLYWIKI_THEME_PATH: $(APPVEYOR_BUILD_FOLDER)/wiki/themes
  RUST_BACKTRACE: "1"

install:
  - nvm install 20
  - nvm use 20
  - node --version
  - npm --version
  - rustup update stable
  - rustup default stable
  - rustc --version

build_script:
  # ----- Stage 1: Wiki Build -----
  - npm install
  - npm run mirror
  - node scripts/flatten-plugins.js
  - node scripts/generate-config.js prod
  - npx tiddlywiki wiki --build index
  - ps: Move-Item wiki\output\index.html wiki\output\lith.html -Force
  - ps: (Get-Content wiki\output\lith.html -Raw) -replace 'content="TiddlyWiki"', 'content="Lithic PKMS"' | Set-Content wiki\output\lith.html -Encoding UTF8
  - ps: Copy-Item wiki\output\lith.html src\lithic.html -Force
  - ps: Write-Host "Wiki build complete -> src/lithic.html"

  # ----- Stage 2: Tauri Build -----
  - ps: if (Test-Path "src\app-icon.png") { npm run tauri icon src\app-icon.png } else { Write-Host "No app-icon.png, skipping." }
  - npm run tauri build
  - ps: |
      $exe = Get-ChildItem "src-tauri\target\release\*.exe" | Select-Object -First 1
      if ($exe) {
          Move-Item $exe.FullName -Destination "Lithic-Offline.exe" -Force
          Write-Host "Renamed to Lithic-Offline.exe"
      } else {
          throw "No .exe found — Tauri build failed."
      }

artifacts:
  - path: src\lithic.html
    name: built-wiki
  - path: Lithic-Offline.exe
    name: lithic-offline-exe
  - path: wiki\tiddlywiki.log
    name: tiddlywiki-log

test: off

# ---------------------------------------------------------------------------
# Deploy — GitHub Release (main branch builds only)
# ---------------------------------------------------------------------------
deploy:
  - provider: GitHub
    auth_token:
      secure: $(GITHUB_TOKEN)
    tag: build-$(APPVEYOR_BUILD_VERSION)
    release: Build $(APPVEYOR_BUILD_VERSION)
    description: "Automated build from AppVeyor (fallback CI)"
    draft: false
    prerelease: false
    artifact: built-wiki, lithic-offline-exe
    on:
      branch: main
