name: Bump PWA Version

on:
  push:
    paths:
      - 'src/launcher.html'
      - 'src/lithic.html'
    branches:
      - main

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Version
        run: |
          # Extract current version from manifest.json
          CURRENT_VERSION=$(grep '"version":' manifest.json | sed -E 's/.*"version": "([^"]+)".*/\1/')
          echo "Current Version: $CURRENT_VERSION"
          
          # Increment patch version
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "New Version: $NEW_VERSION"
          
          # Update manifest.json
          sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" manifest.json
          
          # Update offline-service-worker.js
          # Using a more flexible regex for the service worker version line
          sed -i "s/const VERSION = '[^']*'; \/\/ Updated by build pipeline/const VERSION = '$NEW_VERSION'; \/\/ Updated by build pipeline/" offline-service-worker.js
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json offline-service-worker.js
          git diff --cached --quiet || (git commit -m "chore: bump PWA version to $NEW_VERSION [skip ci]" && git push)
