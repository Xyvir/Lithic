name: Build Server Artifact

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for Docker image (e.g. v1.0.0)'
        required: false
        type: string
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-binary:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            curl tar bash git build-base scons \
            pcre-dev pcre-static zlib-dev zlib-static \
            libxml2-dev libxml2-static sqlite-dev sqlite-static \
            expat-dev expat-static util-linux-dev util-linux-static linux-headers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build lighttpd
        run: |
          VERSION="1.4.76"
          curl -fsSL https://download.lighttpd.net/lighttpd/releases-1.4.x/lighttpd-$VERSION.tar.gz | tar -xz
          cd lighttpd-$VERSION
          scons -j$(nproc) build_fullstatic=1 build_dynamic=0 with_webdav=1 with_pcre=1 with_zlib=1
          find . -name lighttpd -type f -executable -exec cp {} ../lighttpd \;
      
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighttpd-binary
          path: lighttpd
          retention-days: 1

  package-server:
    needs: build-binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download lighttpd Binary
        uses: actions/download-artifact@v4
        with:
          name: lighttpd-binary
          path: ./

      - name: Download Built Wiki Artifact
        if: ${{ inputs.tag_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: built-wiki
          path: build/wiki-artifact
        continue-on-error: true

      - name: Use Downloaded Wiki
        if: ${{ inputs.tag_name != '' }}
        run: |
          cp build/wiki-artifact/lith.html src/lithic.html || echo "Skipped: Artifact not found"

      - name: Bump PWA Version
        run: |
          VERSION="${{ inputs.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +'%Y.%m.%d-%H%M')"
          fi
          echo "Bumping version to $VERSION"
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"$VERSION\"/" manifest.json
          sed -i "s/const VERSION = '0.0.0'/const VERSION = '$VERSION'/" offline-service-worker.js

      - name: Assemble public directory
        run: |
          mkdir -p build/app/public/src
          cp src/launcher.html build/app/public/src/launcher.html 2>/dev/null || true
          cp src/lithic.html   build/app/public/src/lithic.html 2>/dev/null || true
          cp index.html build/app/public/index.html 2>/dev/null || true
          cp -f favicon* build/app/public/ 2>/dev/null || true
          cp -f mstile* build/app/public/ 2>/dev/null || true
          cp -f android-chrome* build/app/public/ 2>/dev/null || true
          cp -f apple-touch-icon.png build/app/public/ 2>/dev/null || true
          cp -f manifest.json build/app/public/ 2>/dev/null || true
          cp -f site.webmanifest build/app/public/ 2>/dev/null || true
          cp -f offline-service-worker.js build/app/public/ 2>/dev/null || true
          cp -f intro.* build/app/public/ 2>/dev/null || true
          cp -f 404.html build/app/public/ 2>/dev/null || true
          cp -f src/mstile* build/app/public/src/ 2>/dev/null || true
          cp -f src/app-icon.png build/app/public/src/ 2>/dev/null || true

      - name: Assemble app directory
        run: |
          mkdir -p build/app/scripts
          mv lighttpd build/app/lighttpd
          cp deploy/entrypoint.sh build/app/entrypoint.sh
          cp deploy/watcher.sh build/app/watcher.sh
          cp deploy/github-sync.sh build/app/scripts/github-sync.sh
          chmod +x build/app/entrypoint.sh build/app/watcher.sh build/app/scripts/github-sync.sh build/app/lighttpd

      - name: Create God Artifact tarball
        run: |
          cd build
          tar -czf ../lithic-server.tar.gz app/
          cd ..

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lithic-server
          path: lithic-server.tar.gz
          retention-days: 7

      - name: Add to Release
        if: ${{ inputs.tag_name != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag_name }}
          files: lithic-server.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ inputs.tag_name != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.tag_name != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ inputs.tag_name != '' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag_name }}

      - name: Build and push Docker image
        if: ${{ inputs.tag_name != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}