name: Build Server Artifact

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for Docker image (e.g. v1.0.0)'
        required: false
        type: string
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            curl \
            tar \
            bash \
            git \
            build-base \
            scons \
            pcre-dev \
            pcre-static \
            zlib-dev \
            zlib-static \
            libxml2-dev \
            libxml2-static \
            sqlite-dev \
            sqlite-static \
            expat-dev \
            expat-static \
            util-linux-dev \
            util-linux-static \
            linux-headers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Build lighttpd
        run: |
          VERSION="1.4.76"
          curl -fsSL https://download.lighttpd.net/lighttpd/releases-1.4.x/lighttpd-$VERSION.tar.gz | tar -xz
          cd lighttpd-$VERSION
          # Build a fully static binary with WebDAV and CGI support
          scons -j$(nproc) build_fullstatic=1 build_dynamic=0 with_webdav=1 with_pcre=1 with_zlib=1
          
          # Find and copy the binary (it might be in src/ or a build/ dir)
          find . -name lighttpd -type f -executable -exec cp {} ../lighttpd_binary \;
          cd ..
          mkdir -p build
          mv lighttpd_binary build/lighttpd

      - name: Verify lighttpd binary
        run: |
          ls -lh build/lighttpd
          file build/lighttpd
          # On musl/alpine, ldd should show "Not a valid dynamic program" or similar
          ldd build/lighttpd || echo "Static check: success"

      # --- Download built wiki if chained from build-wiki ---
      - name: Download Built Wiki Artifact
        if: ${{ inputs.tag_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: built-wiki
          path: build/wiki-artifact
        continue-on-error: true

      - name: Use Downloaded Wiki
        if: ${{ inputs.tag_name != '' }}
        run: |
          cp build/wiki-artifact/lith.html src/lithic.html || echo "Skipped: Artifact not found"

      # --- Bump PWA Version ---
      - name: Bump PWA Version
        run: |
          VERSION="${{ inputs.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +'%Y.%m.%d-%H%M')"
          fi
          echo "Bumping version to $VERSION"
          
          # Update manifest.json
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"$VERSION\"/" manifest.json
          
          # Update offline-service-worker.js
          sed -i "s/const VERSION = '0.0.0'/const VERSION = '$VERSION'/" offline-service-worker.js

      # --- Assemble public directory ---
      - name: Assemble public directory
        run: |
          mkdir -p build/app/public/src

          # Core Lithic files (graceful fail to prevent crash during untagged dev runs)
          cp src/launcher.html build/app/public/src/launcher.html 2>/dev/null || echo "Missing launcher.html"
          cp src/lithic.html   build/app/public/src/lithic.html 2>/dev/null || echo "Missing lithic.html"

          # Root index (redirects to launcher)
          cp index.html build/app/public/index.html 2>/dev/null || echo "Missing index.html"

          # Static assets
          cp -f favicon.ico              build/app/public/ 2>/dev/null || true
          cp -f favicon-16x16.png        build/app/public/ 2>/dev/null || true
          cp -f favicon-32x32.png        build/app/public/ 2>/dev/null || true
          cp -f mstile-150x150.png       build/app/public/ 2>/dev/null || true
          cp -f mstile-310x310.png       build/app/public/ 2>/dev/null || true
          cp -f android-chrome-192x192.png build/app/public/ 2>/dev/null || true
          cp -f android-chrome-512x512.png build/app/public/ 2>/dev/null || true
          cp -f apple-touch-icon.png     build/app/public/ 2>/dev/null || true
          cp -f manifest.json            build/app/public/ 2>/dev/null || true
          cp -f site.webmanifest         build/app/public/ 2>/dev/null || true
          cp -f offline-service-worker.js build/app/public/ 2>/dev/null || true
          cp -f intro.html               build/app/public/ 2>/dev/null || true
          cp -f intro.lith               build/app/public/ 2>/dev/null || true
          cp -f 404.html                 build/app/public/ 2>/dev/null || true

          # Copy src/ static assets
          cp -f src/mstile-150x150.png   build/app/public/src/ 2>/dev/null || true
          cp -f src/app-icon.png         build/app/public/src/ 2>/dev/null || true

      # --- Assemble app directory ---
      - name: Assemble app contents
        run: |
          mv build/lighttpd build/app/lighttpd
          cp deploy/entrypoint.sh build/app/entrypoint.sh 2>/dev/null || echo "Warning: entrypoint.sh missing"
          cp deploy/watcher.sh build/app/watcher.sh 2>/dev/null || echo "Warning: watcher.sh missing"
          cp deploy/github-sync.sh build/app/scripts/github-sync.sh 2>/dev/null || echo "Warning: github-sync.sh missing"
          cp deploy/.agents build/app/.agents 2>/dev/null || echo "Warning: .agents missing"
          chmod +x build/app/entrypoint.sh build/app/watcher.sh build/app/scripts/github-sync.sh build/app/lighttpd

      # --- Create tarball ---
      - name: Create God Artifact tarball
        run: |
          cd build
          tar -czf ../lithic-server.tar.gz app/
          cd ..
          ls -lh lithic-server.tar.gz
          echo "=== Contents ==="
          tar -tzf lithic-server.tar.gz | head -30

      # --- Upload artifact (always) ---
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lithic-server
          path: lithic-server.tar.gz
          retention-days: 7

      # --- Release (only if tag_name is provided) ---
      - name: Add to Release
        if: ${{ inputs.tag_name != '' }}
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag_name }}
          files: lithic-server.tar.gz

      # --- Docker Publish (chained only) ---
      - name: Set up Docker Buildx
        if: ${{ inputs.tag_name != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: ${{ inputs.tag_name != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: ${{ inputs.tag_name != '' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag_name }}

      - name: Build and push Docker image
        if: ${{ inputs.tag_name != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}